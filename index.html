  {
    id:1, title:"請假信", tag:"第一關 · 基礎",
    to:"professor.hung@school.edu.tw",
    scene:`你是<em>光電／工管一年級</em>的學生，<em>下週四上午</em>需要回診（或家中有突發狀況），無法出席國文課。

    pts:["主旨含身分摘要","正式稱謂","自我介紹＋課程","日期與原因","詢問補課/作業","禮貌結語"],

      t=>/光電|工管|班|學號|[Bb]\d{5,}/.test(t),
      t=>/老師|洪老師|professor|dear/i.test(t),
      t=>/我是|修習|選修|本學期/.test(t),
      t=>/週四|下週|日期|因為|回診|身體|家中|突發/.test(t),
      t=>/補課|作業|補交|進度|後續/.test(t),
      t=>/謝謝|感謝|敬上|此致|順心|麻煩/.test(t),
    ]
  },
  {
    id:2, title:"詢問信（5W架構）", tag:"第二關 · 進階",
    to:"professor.hung@school.edu.tw",
    scene:`你的小組<em>期末專題報告</em>下週要繳交，但不確定：<br>
① 報告頁數限制　② 是否需要附參考文獻　③ 繳交方式（系統上傳？還是紙本？）<br><br>
請依課堂教的 <em>What / Why / When / What you need / How</em> 架構，寫一封完整的詢問信給老師。`,

/* ════ 成績存儲（JSONBin.io） ════
   自動建立 Bin，免手動設定
════════════════════════════════ */
let _binId = (typeof BIN_ID !== 'undefined' ? BIN_ID : '') || localStorage.getItem('__binId') || '';

async function dbRead(){
  if(!_binId) return {};
  const r = await fetch(`https://api.jsonbin.io/v3/b/${_binId}/latest`,{
    headers:{'X-Master-Key': JSONBIN_KEY}
  });
  if(!r.ok) return {};
  const d = await r.json();
  return d.record || {};
}

async function dbWrite(data){
  if(!JSONBIN_KEY || JSONBIN_KEY.startsWith('貼上')) return;
  if(!_binId){
    // 自動建立 Bin
    const r = await fetch('https://api.jsonbin.io/v3/b',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Name':'email-game-scores','X-Bin-Private':'false'},
      body: JSON.stringify(data)
    });
    if(r.ok){
      const d = await r.json();
      _binId = d.metadata.id;
      localStorage.setItem('__binId', _binId);
    }
  } else {
    await fetch(`https://api.jsonbin.io/v3/b/${_binId}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
      body: JSON.stringify(data)
    });
  }
}

async function saveScore(lvId, score){
  try{
    const key = `${ST.cls}__${ST.id}`.replace(/\s/g,'_');
    let all = await dbRead();
    if(!all[key]) all[key]={name:ST.name,cls:ST.cls,stuId:ST.id};
    all[key][`lv${lvId}`] = score;
    all[key].updatedAt = new Date().toISOString();
    await dbWrite(all);
  }catch(e){ console.warn('成績儲存失敗：',e); }
}

/* ════ App State ════ */
const ST = {cls:'',id:'',name:'',lvIdx:0,scores:[null,null,null]};

/* ════ Helpers ════ */
function show(id){
  ['S0','S1','S2','S3'].forEach(s=>{

    el.style.display = s===id?(s==='S0'?'flex':'block'):'none';
  });
}
function setTop(n,b){
  document.getElementById('topName').textContent=n||'';

}
function toast(m){
  const el=document.createElement('div');el.className='toast';el.textContent=m;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}

/* ════ Submit ════ */
async function doSubmit(){
  const subj=document.getElementById('fSubj').value.trim();
  const body=document.getElementById('fBody').value.trim();
  if(!subj){toast('請填寫主旨');return;}
  if(body.length<40){toast('內文太短，請再補充');return;}

  // 檢查 API Key
  if(!CLAUDE_KEY||CLAUDE_KEY.startsWith('貼上')||CLAUDE_KEY.length<20){
    document.getElementById('resBox').style.display='block';
    document.getElementById('resBox').innerHTML=`<div class="errmsg"><b>⚠ Claude API Key 尚未填入</b>請用記事本開啟 HTML 檔案，將最上方的 CLAUDE_KEY 填入你的 API Key。<br>取得位置：<a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></div>`;
    return;
  }

  document.getElementById('actRow').style.display='none';
  document.getElementById('loadBox').style.display='block';

  const lv=LVS[ST.lvIdx];
  const prompt=`你是大學國文老師，專門批改 Email 寫作。請評估以下學生信件。

學生：${ST.cls} ${ST.id} ${ST.name}
情境：${lv.scene.replace(/<br>|<[^>]+>/g,' ')}

信件內容：
主旨：${subj}
內文：${body}

只輸出以下 JSON，不得有其他文字：
{"subj":整數0到20,"greeting":整數0到15,"intro":整數0到20,"content":整數0到25,"closing":整數0到20,"total":總和0到100,"grade":"A或B或C或D","feedback":"評語50至80字，先說優點再說改進，繁體中文，語氣像老師批改作業"}

評分：subj=主旨含身分摘要是否清楚(20)，greeting=稱謂正式有禮(15)，intro=自我介紹與來意(20)，content=正文資訊完整5W(25)，closing=結語明確有禮(20)，grade: A≥90 B≥75 C≥60 D<60`;

  let result=null, errMsg='';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':CLAUDE_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5',
        max_tokens:500,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!resp.ok){
      const txt=await resp.text();
      throw new Error(`HTTP ${resp.status}：${txt.slice(0,200)}`);
    }
    const data=await resp.json();
    if(data.error) throw new Error(data.error.message);
    const raw=data.content?.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    result=JSON.parse(raw);
  }catch(e){
    errMsg=e.message||String(e);
    console.error('評分錯誤：',e);
  }

  document.getElementById('loadBox').style.display='none';

  if(!result){
    document.getElementById('resBox').style.display='block';
    document.getElementById('actRow').style.display='flex';
    document.getElementById('resBox').innerHTML=`
      <div class="errmsg">
        <b>⚠ AI 評分失敗，請確認以下幾點：</b>
        1. CLAUDE_KEY 是否已正確填入（開頭應為 sk-ant-）<br>
        2. API Key 是否有足夠額度（<a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> 查看）<br>
        3. 網路是否正常<br><br>
        錯誤訊息：${errMsg}
      </div>
      <button class="btn bghost bfull" onclick="retrySubmit()">重新送出</button>`;
    return;
  }

  ST.scores[ST.lvIdx]=result.total;
  await saveScore(lv.id, result.total);
  showResult(result);
}

function retrySubmit(){
  document.getElementById('resBox').style.display='none';
  doSubmit();
}

function showResult(r){
  const rb=document.getElementById('resBox');
  rb.style.display='block';
  const isLast=ST.lvIdx===LVS.length-1;
  const nxt=isLast
    ?`<button class="btn bgold bfull" onclick="showSum()">查看總成績 🏆</button>`
    :`<button class="btn bnavy bfull" onclick="goLv(${ST.lvIdx+1})">下一關 →</button>`;

  const bars=[
    {n:'主旨(20)',v:r.subj,m:20,c:'#1a6ea6'},
    {n:'稱謂(15)',v:r.greeting,m:15,c:'#1a8c49'},
    {n:'自我介紹(20)',v:r.intro,m:20,c:'#7c3aed'},
    {n:'正文(25)',v:r.content,m:25,c:'#c07800'},
    {n:'結語(20)',v:r.closing,m:20,c:'#bf3b2b'},
  ];

  rb.innerHTML=`
    <div class="card g${r.grade}" style="text-align:center;margin-bottom:1rem">
      <div class="sring"><span class="sn">${r.total}</span><span class="sl">/ 100</span></div>
      <div class="gword">等第 ${r.grade}</div>
      <div class="gsub">${LVS[ST.lvIdx].title}｜${ST.cls} ${ST.id} ${ST.name}</div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="barlist">${bars.map(b=>`
        <div class="brow">
          <span class="bname">${b.n}</span>
          <div class="btrack"><div class="bfill" style="width:${Math.round(b.v/b.m*100)}%;background:${b.c}"></div></div>
          <span class="bval">${Math.round(b.v)}/${b.m}</span>
        </div>`).join('')}</div>
      <div class="fbbox">💬 ${r.feedback}</div>
    </div>
    <div style="margin-bottom:.75rem">${nxt}</div>
    <button class="btn bghost bfull" onclick="goLv(${ST.lvIdx})" style="margin-bottom:1rem">重新作答此題</button>`;
}

function showSum(){
  show('S2');
  const v=ST.scores.filter(s=>s!=null);
  const avg=v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0;
  const g=avg>=90?'A':avg>=75?'B':avg>=60?'C':'D';
  document.getElementById('subT').textContent=`${ST.cls} ${ST.id} ${ST.name}｜平均 ${avg} 分，等第 ${g}`;
  document.getElementById('sgrid').innerHTML=`
    <div class="sstat"><div class="sv" style="color:var(--blue)">${avg}</div><div class="sl">平均分數</div></div>
    <div class="sstat"><div class="sv" style="color:var(--green)">${g}</div><div class="sl">整體等第</div></div>
    <div class="sstat"><div class="sv" style="color:var(--amber)">${v.length}/${LVS.length}</div><div class="sl">完成關卡</div></div>`;
  document.getElementById('sbars').innerHTML=`
    <div class="cltitle" style="margin-bottom:.75rem">各關成績</div>
    ${LVS.map((lv,i)=>`
      <div class="brow" style="margin-bottom:10px">
        <span class="bname" style="width:90px">${lv.title}</span>
        <div class="btrack"><div class="bfill" style="width:${ST.scores[i]||0}%;background:var(--navy)"></div></div>
        <span class="bval">${ST.scores[i]??'—'}</span>
      </div>`).join('')}`;
}
function replay(){ST.scores=[null,null,null];goLv(0);}

/* ════ Teacher ════ */
let allStu=[], clsF='全部班級';

async function loadT(){
  document.getElementById('ttbl').innerHTML='<div class="spinwrap"><div class="spin"></div></div>';
  allStu=[];

  if(!JSONBIN_KEY||JSONBIN_KEY.startsWith('貼上')){
    document.getElementById('ttbl').innerHTML='<div style="padding:2rem;text-align:center;color:var(--red);font-family:-apple-system,sans-serif;font-size:14px">⚠ JSONBin API Key 尚未設定<br><small>填入後學生作答的成績就會在這裡顯示</small></div>';
    document.getElementById('tstats').innerHTML='';
    document.getElementById('ctabs').innerHTML='';
    return;
  }

  try{
    const data=await dbRead();
    allStu=Object.values(data);
  }catch(e){
    document.getElementById('ttbl').innerHTML=`<div style="padding:2rem;text-align:center;color:var(--red);font-family:-apple-system,sans-serif;font-size:14px">⚠ 讀取失敗：${e.message}</div>`;
    return;
  }

  const cls=['全部班級',...new Set(allStu.map(s=>s.cls).filter(Boolean))].sort((a,b)=>a==='全部班級'?-1:0);
  if(!cls.includes(clsF)) clsF='全部班級';
  document.getElementById('ctabs').innerHTML=cls.map(c=>`<button class="ctab${c===clsF?' on':''}" onclick="fCls('${c}')">${c}</button>`).join('');
  renderT();
}

function fCls(c){
  clsF=c;
  document.querySelectorAll('.ctab').forEach(b=>b.classList.toggle('on',b.textContent===c));
  renderT();
}

function renderT(){
  const list=clsF==='全部班級'?allStu:allStu.filter(s=>s.cls===clsF);
  const sc=list.flatMap(s=>[s.lv1,s.lv2,s.lv3].filter(x=>x!=null));
  const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):0;
  const pass=sc.length?Math.round(sc.filter(s=>s>=60).length/sc.length*100):0;

  document.getElementById('tstats').innerHTML=`
    <div class="tstat"><div class="tv tvb">${list.length}</div><div class="tl">學生人數</div></div>
    <div class="tstat"><div class="tv tvg">${avg}</div><div class="tl">平均分數</div></div>
    <div class="tstat"><div class="tv tva">${pass}%</div><div class="tl">及格率(≥60)</div></div>`;
  document.getElementById('ttitle').textContent=`${clsF}`;

  if(!list.length){document.getElementById('ttbl').innerHTML='<div style="padding:2rem;text-align:center;color:var(--ink3);font-family:-apple-system,sans-serif">此班級尚無作答紀錄</div>';return;}

  function ra(s){const d=[s.lv1,s.lv2,s.lv3].filter(x=>x!=null);return d.length?Math.round(d.reduce((a,b)=>a+b,0)/d.length):null;}
  function gof(v){if(v==null)return'—';return v>=90?'A':v>=75?'B':v>=60?'C':'D';}
  function pc(g){return{A:'pA',B:'pB',C:'pC',D:'pD'}[g]||'';}
  function dots(s){return[s.lv1,s.lv2,s.lv3].map(v=>`<div class="pd${v!=null?' on':''}"></div>`).join('');}

  const sorted=[...list].sort((a,b)=>(a.cls||'').localeCompare(b.cls||'')||(a.stuId||'').localeCompare(b.stuId||''));
  document.getElementById('ttbl').innerHTML=`
    <table>
      <thead><tr><th>班級</th><th>學號</th><th>姓名</th><th>進度</th>
        <th>${LVS[0].title}</th><th>${LVS[1].title}</th><th>${LVS[2].title}</th>
        <th>平均</th><th>等第</th></tr></thead>
      <tbody>${sorted.map(s=>{
        const av=ra(s),g=gof(av);
        return`<tr><td>${s.cls||'—'}</td><td style="color:var(--ink3);font-size:12px">${s.stuId||'—'}</td>
          <td style="font-weight:700">${s.name||'—'}</td>
          <td><div class="pdots">${dots(s)}</div></td>
          <td>${s.lv1??'—'}</td><td>${s.lv2??'—'}</td><td>${s.lv3??'—'}</td>
          <td style="font-weight:700">${av??'—'}</td>
          <td><span class="pill ${pc(g)}">${g}</span></td></tr>`;
      }).join('')}</tbody>
    </table>`;
}
